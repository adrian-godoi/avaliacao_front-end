<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Candidato - Verificar Cursos</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Portal do Candidato - ENEM</h1>
        <nav class="menu-navegacao">
            <a href="painel.html">Painel Principal</a>
            <a href="cursos.html" class="active">Verificação de Cursos</a>
            <a href="inscricao.html">Inscrição</a>
            <a href="login.html" class="btn-sair">Sair</a>
        </nav>
    </header>

    <main class="content">
        <section class="container-cursos">
            <h2>Consulta de Cursos Disponíveis</h2>
            <p>Selecione uma área do conhecimento para visualizar as opções:</p>

            <div class="filtro-container">
                <label for="filtro-area">Área do Conhecimento:</label>
                <select id="filtro-area">
                    <option value="">-- Selecione uma Área --</option>
                    <option value="Exatas">Ciências Exatas</option>
                    <option value="Humanas">Ciências Humanas</option>
                    <option value="Natureza">Ciências da Natureza</option>
                    <option value="Linguagens">Linguagens</option>
                </select>
            </div>

            <div id="resultado-cursos" class="lista-cursos-cards">
                <p class="mensagem-ajuda">Escolha uma área acima para listar os cursos.</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Adrian Gualberto de Godoi. Todos os direitos reservados.</p>
    </footer>

    <script src="cursos.js"></script>
</body>

</html>
