<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Cadastro</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="cadastro.css">
</head>

<body>

    <header>
        <h1>Portal do Candidato - ENEM</h1>
    </header>

    <main class="content">
        <form id="cadastroForm" action="#" method="post">
            <h2>Formulário</h2>

            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" name="nome" required>

            <label for="email">E-Mail:</label>
            <input type="text" id="email" name="email" required>
            <div id="error-email" class="error-message"></div>

            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" required>

            <label for="mae">Nome da Mãe:</label>
            <input type="text" id="mae" name="mae" required>

            <label for="pai">Nome do Pai:</label>
            <input type="text" id="pai" name="pai" required>

            <label for="rua">Endereço (Rua/Avenida):</label>
            <input type="text" id="rua" name="rua" required>

            <label for="numero">Número:</label>
            <input type="text" id="numero" name="numero" required>

            <label for="cidade">Cidade:</label>
            <input type="text" id="cidade" name="cidade" required>

            <label for="estado">Estado:</label>
            <input type="text" id="estado" name="estado" required>

            <label for="pais">País:</label>
            <input type="text" id="pais" name="pais" required>

            <label for="situacao_em">Situação do Ensino Médio:</label>
            <select id="situacao_em" name="situacao_em" required>
                <option value="opcao">Selecione...</option>
                <option value="concluido">Já concluí</option>
                <option value="cursando">Estou cursando</option>
            </select>

            <label for="tipo_escola">Tipo de Escola:</label>
            <select id="tipo_escola" name="tipo_escola" required>
                <option value="opcao2">Selecione...</option>
                <option value="publica">Pública</option>
                <option value="privada">Privada</option>
            </select>

            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha" required>
            <div id="error-senha" class="error-message"></div>

            <label for="confirmar_senha">Confirmar Senha:</label>
            <input type="password" id="confirmar_senha" name="confirmar_senha" required>
            <div id="error-confirmar" class="error-message"></div>

            <button type="submit" class="btn-destaque">Salvar Inscrição</button>
            <button type="button" id="btnVoltar" class="btn-destaque">Voltar</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Adrian Gualberto de Godoi. Todos os direitos reservados.</p>
    </footer>

    <script src="cadastro.js"></script>
</body>

</html>
